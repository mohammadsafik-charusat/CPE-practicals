<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPE Practicals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-size: 2.2rem; color: #f8fafc; margin-bottom: 8px; }
  header p { color: #94a3b8; font-size: 1rem; }
  .list { display: flex; flex-direction: column; gap: 14px; }
  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 18px 22px;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .item:hover { transform: translateY(-2px); border-color: #38bdf8; }
  .item a { color: #38bdf8; text-decoration: none; font-weight: 600; }
  .item .num {
    background: #334155;
    color: #cbd5e1;
    font-size: 0.8rem;
    padding: 3px 10px;
    border-radius: 20px;
    margin-right: 14px;
  }
  .title-block { display: flex; align-items: center; }
  .title-block .name { font-size: 1.05rem; color: #f1f5f9; }
  footer { text-align: center; margin-top: 40px; color: #64748b; font-size: 0.85rem; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CPE Practicals</h1>
      <p>Lab practicals for CPE subject — click a practical to view it live.</p>
    </header>

    <div class="list">
      <div class="item">
        <div class="title-block">
          <span class="num">1.1</span>
          <a href="practical-01-records-office-beam-inspection/" class="name">Records Office — Beam Inspection</a>
        </div>
      </div>
    </div>

    <footer>CPE Practicals &middot; safik-charusat</footer>
  </div>
</body>
</html>
